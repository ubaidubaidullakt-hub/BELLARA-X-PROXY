<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BELLARA X ACTIVATION</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .login-card { display: inline-block; border: 2px solid #00ff00; padding: 40px; border-radius: 15px; box-shadow: 0 0 20px #00ff00; background: #050505; }
        input { padding: 12px; width: 80%; margin: 15px 0; background: #111; border: 1px solid #00ff00; color: #fff; text-align: center; }
        button { background: #00ff00; color: #000; border: none; padding: 12px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 88%; }
        #hwid { color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>BELLARA X PROXY</h2>
        <p>DEVICE ID: <span id="myID">...</span></p>
        <input type="text" id="userKey" placeholder="PASTE YOUR LICENSE KEY">
        <br>
        <button onclick="activate()">ACTIVATE DEVICE</button>
        <p id="msg"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBOvSMSs5NRMqQ_FJV20jquD_wb3103k50",
            authDomain: "bellara-x-aim.firebaseapp.com",
            databaseURL: "https://bellara-x-aim-default-rtdb.firebaseio.com",
            projectId: "bellara-x-aim",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Universal Device ID Generator (Base64 of Browser Info)
        const deviceID = btoa(navigator.userAgent).substring(10, 26).toUpperCase();
        document.getElementById('myID').innerText = deviceID;

        function activate() {
            const key = document.getElementById('userKey').value;
            const msg = document.getElementById('msg');

            db.ref('licenses/' + key).once('value', (snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    if (data.deviceID === "NOT_LINKED" || data.deviceID === deviceID) {
                        db.ref('licenses/' + key).update({ deviceID: deviceID });
                        msg.style.color = "#00ff00";
                        msg.innerText = "SUCCESS! DEVICE LINKED. RESTART PROXY.";
                    } else {
                        msg.style.color = "red";
                        msg.innerText = "ERROR: KEY ALREADY USED ON ANOTHER DEVICE.";
                    }
                } else {
                    msg.style.color = "red";
                    msg.innerText = "INVALID KEY!";
                }
            });
        }
    </script>
</body>
</html>
